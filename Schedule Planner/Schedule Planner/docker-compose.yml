services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: schedule-planner-app
    environment:
      NODE_ENV: production
      DATABASE_URL: "${DATABASE_URL:-postgresql://planner:planner@db:5432/schedule_planner}"
      PLANNER_DEFAULT_USER_ID: "${PLANNER_DEFAULT_USER_ID:-00000000-0000-0000-0000-000000000001}"
      PLANNER_DEFAULT_TIMEZONE: "${PLANNER_DEFAULT_TIMEZONE:-Asia/Ho_Chi_Minh}"
      AUTH_SESSION_SECRET: "${AUTH_SESSION_SECRET:-change-this-secret-in-production}"
      NANGO_SECRET_KEY: "${NANGO_SECRET_KEY:-}"
      NANGO_BASE_URL: "${NANGO_BASE_URL:-https://api.nango.dev}"
      NANGO_WEBHOOK_SECRET: "${NANGO_WEBHOOK_SECRET:-}"
      NANGO_INTEGRATION_GMAIL: "${NANGO_INTEGRATION_GMAIL:-}"
      NANGO_INTEGRATION_TELEGRAM: "${NANGO_INTEGRATION_TELEGRAM:-}"
      NANGO_TELEGRAM_SEND_PATH: "${NANGO_TELEGRAM_SEND_PATH:-/proxy/sendMessage}"
      TELEGRAM_DEFAULT_CHAT_ID: "${TELEGRAM_DEFAULT_CHAT_ID:-}"
      TELEGRAM_WEBHOOK_SECRET_TOKEN: "${TELEGRAM_WEBHOOK_SECRET_TOKEN:-}"
      INTERNAL_SCHEDULER_TOKEN: "${INTERNAL_SCHEDULER_TOKEN:-dev-scheduler-token}"
      REMINDER_DISPATCH_LIMIT: "${REMINDER_DISPATCH_LIMIT:-20}"
      ROUTER_PROVIDER: "${ROUTER_PROVIDER:-rule}"
      MISTRAL_API_KEY: "${MISTRAL_API_KEY:-}"
      MISTRAL_MODEL: "${MISTRAL_MODEL:-mistral-large-latest}"
      MISTRAL_API_URL: "${MISTRAL_API_URL:-https://api.mistral.ai/v1/chat/completions}"
      MISTRAL_TIMEOUT_MS: "${MISTRAL_TIMEOUT_MS:-15000}"
    ports:
      - "${APP_PORT:-3000}:3000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: schedule-planner-scheduler
    command: ["npm", "run", "worker:scheduler"]
    environment:
      DATABASE_URL: "${DATABASE_URL:-postgresql://planner:planner@db:5432/schedule_planner}"
      SCHEDULER_APP_BASE_URL: "${SCHEDULER_APP_BASE_URL:-http://app:3000}"
      INTERNAL_SCHEDULER_TOKEN: "${INTERNAL_SCHEDULER_TOKEN:-dev-scheduler-token}"
      REMINDER_SCHEDULER_ENABLED: "${REMINDER_SCHEDULER_ENABLED:-true}"
      REMINDER_DISPATCH_INTERVAL_MS: "${REMINDER_DISPATCH_INTERVAL_MS:-5000}"
      REMINDER_DISPATCH_LIMIT: "${REMINDER_DISPATCH_LIMIT:-20}"
      TELEGRAM_POLL_ENABLED: "${TELEGRAM_POLL_ENABLED:-true}"
      TELEGRAM_POLL_INTERVAL_MS: "${TELEGRAM_POLL_INTERVAL_MS:-1500}"
      TELEGRAM_POLL_BATCH_LIMIT: "${TELEGRAM_POLL_BATCH_LIMIT:-20}"
      TELEGRAM_POLL_DELETE_WEBHOOK_ON_CONFLICT: "${TELEGRAM_POLL_DELETE_WEBHOOK_ON_CONFLICT:-true}"
      NANGO_SECRET_KEY: "${NANGO_SECRET_KEY:-}"
      NANGO_BASE_URL: "${NANGO_BASE_URL:-https://api.nango.dev}"
      NANGO_INTEGRATION_TELEGRAM: "${NANGO_INTEGRATION_TELEGRAM:-}"
      NANGO_TELEGRAM_UPDATES_PATH: "${NANGO_TELEGRAM_UPDATES_PATH:-/proxy/getUpdates}"
      NANGO_TELEGRAM_DELETE_WEBHOOK_PATH: "${NANGO_TELEGRAM_DELETE_WEBHOOK_PATH:-/proxy/deleteWebhook}"
      TELEGRAM_WEBHOOK_SECRET_TOKEN: "${TELEGRAM_WEBHOOK_SECRET_TOKEN:-}"
    depends_on:
      db:
        condition: service_healthy
      app:
        condition: service_started
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    container_name: schedule-planner-db
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-schedule_planner}"
      POSTGRES_USER: "${POSTGRES_USER:-planner}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-planner}"
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - planner_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    restart: unless-stopped

volumes:
  planner_db_data:
